services:
  cao:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CAO_UID: ${CAO_UID:-1000}
        CAO_GID: ${CAO_GID:-1000}
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9889
      CONTROL_PANEL_HOST: 0.0.0.0
      CONTROL_PANEL_PORT: 8000
      CAO_SERVER_URL: http://127.0.0.1:9889
      CAO_CONSOLE_PASSWORD: ${CAO_CONSOLE_PASSWORD:-admin}
      HOME: /home/cao
      CAO_RUNTIME_DIR: /home/cao/.local/state/cli-agent-orchestrator/runtime
    ports:
      - "8000:8000"
      - "9889:9889"
    volumes:
      - ./.docker/cli-agent-orchestrator:/home/cao/.aws/cli-agent-orchestrator
      - ./.docker/claude:/home/cao/.claude
      - ./.docker/codex:/home/cao/.codex
      - ./.docker/openclaw:/home/cao/.openclaw
      - ./.docker/kiro:/home/cao/.kiro
      - ./.docker/qoder:/home/cao/.qoder
      - ./.docker/copilot:/home/cao/.copilot
      - ./.docker/codebuddy:/home/cao/.codebuddy
      - ./.docker/workspace:/home/cao/workspace
