services:
  cao:
    image: cao-dashboard
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CAO_UID: ${CAO_UID:-1000}
        CAO_GID: ${CAO_GID:-1000}
    user: "${CAO_UID:-1000}:${CAO_GID:-1000}"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9889
      CONTROL_PANEL_HOST: 0.0.0.0
      CONTROL_PANEL_PORT: 8000
      CAO_SERVER_URL: http://127.0.0.1:9889
      CAO_CONSOLE_PASSWORD: ${CAO_CONSOLE_PASSWORD:-admin}
      HOME: /home/cao
      CAO_RUNTIME_DIR: /home/cao/.local/state/cli-agent-orchestrator/runtime
    ports:
      - "8000:8000"
      - "9889:9889"
    volumes:
      - type: bind
        source: ./.docker/cli-agent-orchestrator
        target: /home/cao/.aws/cli-agent-orchestrator
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/amazonq
        target: /home/cao/.aws/amazonq
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/claude
        target: /home/cao/.claude
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/codex
        target: /home/cao/.codex
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/openclaw
        target: /home/cao/.openclaw
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/kiro
        target: /home/cao/.kiro
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/qoder
        target: /home/cao/.qoder
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/copilot
        target: /home/cao/.copilot
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/codebuddy
        target: /home/cao/.codebuddy
        bind:
          create_host_path: true
      - type: bind
        source: ./.docker/workspace
        target: /home/cao/workspace
        bind:
          create_host_path: true
